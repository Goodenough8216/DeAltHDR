# Self-supervised fine-tuning on unlabeled real-world alternating-exposure LDR videos (Sec. 3.4)
name: DeAltHDR_real_selfsup
model_type: DeAltHDRRealModel
scale: 1
num_gpu: 1
manual_seed: 10
n_sequence: 5
# Real LDR only (no gt/). For smoke test you can point to synthetic blur:
# dir_data: ['/hdd1/zhangshuohao/data/synthetic/train/']
dir_data: ['/path/to/real/train/']
n_colors: 3
rgb_range: 1
no_augment: False
loss_type: 1*L1
patch_size: 128
size_must_mode: 4
skip_corrupted: true
max_corrupted_retry: 100
real_input_subdir: blur   # folder name under dataroot: blur/ or ldr/

model: dealthdr_arch
use_dual_encoder: True
training_mode: mixed
num_frames_tocache: 4
sensitivity: 15.0
ema_decay: 0.999
beta_ema: 1.0

type: deblurring
dim: 32
Enc_blocks: [2, 4, 6]
Middle_blocks: 6
Dec_blocks: [6, 4, 2]
num_refinement_blocks: 1
use_both_input: True
num_heads_blks: [1, 2, 4, 8]
ffn_expansion_factor: 2.5

encoder1_attn_type1: ReducedAttn
encoder1_attn_type2: ReducedAttn
encoder1_ffw_type: FFW
encoder2_attn_type1: ReducedAttn
encoder2_attn_type2: ReducedAttn
encoder2_ffw_type: FFW
encoder3_attn_type1: Channel
encoder3_attn_type2: Channel
encoder3_ffw_type: GFFW

decoder1_attn_type1: Channel
decoder1_attn_type2: Channel
decoder1_ffw_type: GFFW
decoder2_attn_type1: Channel
decoder2_attn_type2: Channel
decoder2_ffw_type: GFFW
decoder3_attn_type1: Channel
decoder3_attn_type2: Channel
decoder3_ffw_type: GFFW

latent_attn_type1: FHR
latent_attn_type2: Channel
latent_ffw_type: GFFW
refinement_attn_type1: ReducedAttn
refinement_attn_type2: ReducedAttn
refinement_ffw_type: GFFW

datasets:
  train:
    name: real-train
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 128
    use_flip: false
    use_rot: false
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

path:
  # Synthetic pre-trained checkpoint from stage-1 training
  pretrain_network_g: experiments/DeAltHDR_dual_encoder_mixed_training/models/net_g_latest.pth
  strict_load_g: true
  param_key: params
  resume_state: ~

train:
  optim_g:
    type: AdamW
    lr: !!float 1e-5
    weight_decay: !!float 1e-4
    betas: [0.9, 0.99]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 50000
    eta_min: !!float 1e-7

  total_iter: 50000
  warmup_iter: -1

logger:
  print_freq: 20
  save_checkpoint_freq: !!float 2000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
